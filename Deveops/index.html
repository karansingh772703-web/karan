<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Registration Form</h1>

<form id="myForm">

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter Name">

<label>Email</label>
<input type="email" id="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="Enter Phone Number">

<label for="dob">Date of Birth</label>
<input type="date" id="dob" title="Date of Birth">

<label>Gender</label>

<div class="gender">

<label><input type="radio" name="gender" value="Male"> Male</label>

<label><input type="radio" name="gender" value="Female"> Female</label>

<label><input type="radio" name="gender" value="Other"> Other</label>

</div>

<label for="city">City</label>

<select id="city">

<option value="">Select City</option>

<option>Jaipur</option>

<option>Delhi</option>

<option>Mumbai</option>

<option>Kota</option>

<option>Udaipur</option>

</select>

<label>Skills</label>

<div class="skills">

<label><input type="checkbox" name="skills" value="HTML"> HTML</label>

<label><input type="checkbox" name="skills" value="CSS"> CSS</label>

<label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>

<label><input type="checkbox" name="skills" value="React"> React</label>

<label><input type="checkbox" name="skills" value="Node.js"> Node.js</label>

</div>

<label for="address">Address</label>

<textarea id="address" rows="4" placeholder="Enter Address" title="Address"></textarea>

<label for="photo">Upload Photo</label>

<input type="file" id="photo" title="Upload Photo">

<div class="terms">

<label for="terms">
<input type="checkbox" id="terms" title="Agree to Terms & Conditions">
I Agree Terms & Conditions
</label>

</div>

<button type="submit">Register</button>

</form>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
